<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #0F172A;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      background: #1E293B;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #334155;
    }
    .header-icon { font-size: 20px; }
    .header-title { font-size: 14px; font-weight: 700; color: #E2E8F0; }
    .header-sub   { font-size: 11px; color: #64748B; }
    .section { padding: 14px 16px; border-bottom: 1px solid #1E293B; }
    .section-title {
      font-size: 10px; font-weight: 600; color: #64748B;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px;
    }
    .field { margin-bottom: 10px; }
    .field label { font-size: 11px; color: #94A3B8; display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 7px 10px;
      background: #1E293B; border: 1px solid #334155;
      border-radius: 6px; color: #E2E8F0; font-size: 12px;
    }
    .field input:focus { outline: none; border-color: #3B82F6; }
    .toggle-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .toggle-label { font-size: 12px; color: #CBD5E1; }
    .toggle {
      width: 36px; height: 20px; background: #334155;
      border-radius: 10px; position: relative;
      cursor: pointer; border: none; transition: background 0.2s;
    }
    .toggle.on { background: #22C55E; }
    .toggle::after {
      content: ''; position: absolute;
      width: 16px; height: 16px; background: white;
      border-radius: 50%; top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }
    .save-btn {
      width: 100%; padding: 9px;
      background: #1D4ED8; color: white;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .save-btn:hover { background: #2563EB; }
    .status {
      padding: 10px 16px; font-size: 11px;
      text-align: center; color: #64748B;
    }
    .status.ok  { color: #22C55E; }
    .status.err { color: #EF4444; }
    .threshold-row {
      display: flex; align-items: center; gap: 10px;
    }
    .threshold-row input[type=range] { flex: 1; }
    .threshold-val {
      font-size: 13px; font-weight: 700;
      color: #E2E8F0; min-width: 30px; text-align: right;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🛡️</div>
  <div>
    <div class="header-title">Trust Intelligence</div>
    <div class="header-sub">Marketplace Seller Tool</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Configuration</div>
  <div class="field">
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8000" />
  </div>
  <div class="field">
    <label>Merchant ID</label>
    <input type="text" id="merchantId" placeholder="merchant-amazon" />
  </div>
</div>

<div class="section">
  <div class="section-title">Rules</div>
  <div class="field">
    <label>COD Block Threshold</label>
    <div class="threshold-row">
      <input type="range" id="threshold" min="0" max="100" value="40" step="5" />
      <span class="threshold-val" id="thresholdVal">40</span>
    </div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Auto-block COD on high risk</span>
    <button class="toggle" id="autoBlock"></button>
  </div>
</div>

<div class="section">
  <button class="save-btn" id="saveBtn">Save Settings</button>
  <div class="status" id="status"></div>
</div>

<div class="status" id="apiStatus">Checking API...</div>

<script src="popup.js"></script>
</body>
</html>
